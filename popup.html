<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; font-family: sans-serif; text-align: center; padding: 15px; }
    /* This makes a clean, unmissable click button */
    .file-btn { 
      display: block; width: 100%; padding: 12px; 
      background: #4285f4; color: white; border: none; 
      border-radius: 4px; font-weight: bold; cursor: pointer; 
    }
    .file-btn:hover { background: #357ae8; }
  </style>
</head>
<body>
  <h3>Gemini Clean Up</h3>
  <input type="file" id="file-input" accept="image/*" class="file-btn">
  <canvas id="canvas" style="display:none;"></canvas>
  <script src="popup.js"></script>
</body>
</html>
